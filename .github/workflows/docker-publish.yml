name: Docker Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push default image
        run: |
          docker build \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Build and push opencode image
        run: |
          docker build \
            -f Dockerfile.opencode \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-opencode \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest-opencode \
            .
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-opencode
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest-opencode
