name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-windows-amd64.exe ./cmd/bridge-acp

      - name: Build Windows (arm64)
        run: GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o bridge-acp-windows-arm64.exe ./cmd/bridge-acp

      - name: Build Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-linux-amd64 ./cmd/bridge-acp

      - name: Build macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-darwin-amd64 ./cmd/bridge-acp

      - name: Build macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bridge-acp-darwin-arm64 ./cmd/bridge-acp

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bridge-acp-windows-amd64.exe
            bridge-acp-windows-arm64.exe
            bridge-acp-linux-amd64
            bridge-acp-darwin-amd64
            bridge-acp-darwin-arm64
            config.example.json
          generate_release_notes: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push default image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }} \
            -t ghcr.io/${{ github.repository }}:latest \
            .
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Build and push opencode image
        run: |
          docker build \
            -f Dockerfile.opencode \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-opencode \
            -t ghcr.io/${{ github.repository }}:latest-opencode \
            .
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}-opencode
          docker push ghcr.io/${{ github.repository }}:latest-opencode
