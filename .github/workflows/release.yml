name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-windows-amd64.exe ./cmd/bridge-acp

      - name: Build Windows (arm64)
        run: GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o bridge-acp-windows-arm64.exe ./cmd/bridge-acp

      - name: Build Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-linux-amd64 ./cmd/bridge-acp

      - name: Build macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bridge-acp-darwin-amd64 ./cmd/bridge-acp

      - name: Build macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o bridge-acp-darwin-arm64 ./cmd/bridge-acp

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bridge-acp-windows-amd64.exe
            bridge-acp-windows-arm64.exe
            bridge-acp-linux-amd64
            bridge-acp-darwin-amd64
            bridge-acp-darwin-arm64
            config.example.json
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
