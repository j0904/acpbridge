# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

git:
  ignore_tags:
    - nightly
    - ".*-nightly.*"

before:
  hooks:
    - go mod tidy

builds:
  - id: bridge-acp-linux-amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - amd64
    main: ./cmd/bridge-acp

  - id: bridge-acp-linux-arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - arm64
    main: ./cmd/bridge-acp

  - id: bridge-acp-windows-amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - windows
    goarch:
      - amd64
    main: ./cmd/bridge-acp

  - id: bridge-acp-darwin-amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - darwin
    goarch:
      - amd64
    main: ./cmd/bridge-acp

  - id: bridge-acp-darwin-arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - darwin
    goarch:
      - arm64
    main: ./cmd/bridge-acp

archives:
  - id: bridge-acp
    ids:
      - bridge-acp-linux-amd64
      - bridge-acp-linux-arm64
      - bridge-acp-windows-amd64
      - bridge-acp-darwin-amd64
      - bridge-acp-darwin-arm64
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  disable: '{{ isEnvSet "NIGHTLY_BUILD" }}'
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
